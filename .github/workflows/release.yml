name: Build AppImage
on:
  workflow_dispatch:
  schedule:
    - cron: "5 */12 * * *"
  push:
    branches:
      - "main"
env:
  METADATA_URL: https://antigravity-ide-auto-updater-974169037036.us-central1.run.app/releases
  APP_UPDATE_NEEDED: true
  APP_SHORT_NAME: Antigravity
  APP_NAME: Antigravity Ide
jobs:
  version:
    name: AntiGravity AppImage
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@main
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq libfuse2 imagemagick
      - name: Resolve latest AntiGravity release
        run: |
          metadata="$(curl -fsSL "$METADATA_URL")"
          version="$(echo "$metadata" | jq -r '.[0].version')"
          execution_id="$(echo "$metadata" | jq -r '.[0].execution_id')"
          package_url="https://edgedl.me.gvt1.com/edgedl/release2/j0qc3/antigravity/stable/${version}-${execution_id}/linux-x64/Antigravity%20IDE.tar.gz"
          wget -O "antigravity.tar.gz" "$package_url"
          mkdir -p AppDir
          tar -xzf "antigravity.tar.gz" -C "AppDir"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "execution_id=$execution_id" >> "$GITHUB_OUTPUT"
          echo "package_url=$package_url" >> "$GITHUB_OUTPUT"

      - name: Build
        uses: AppImageCrafters/build-appimage@master
        with:
          recipe: "./appimage-demo-qt5/AppImageBuilder.yml"
        env:
          UPDATE_INFO: gh-releases-zsync|AppImageCrafters|appimage-demo-qt5|latest|*x86_64.AppImage.zsync

      - name: Upload artifact and release
        if: ${{ env.APP_UPDATE_NEEDED == 'true' }}
        uses: actions/upload-artifact@main
        with:
          name: antigravity.AppImage
          path: "dist"
      - name: Release
        if: ${{ env.APP_UPDATE_NEEDED == 'true' }}
        uses: softprops/action-gh-release@master
        with:
          title: antigravity AppImage
          automatic_release_tag: ${{ env.APP_VERSION }}
          prerelease: false
          files: |
            dist/antigravity.AppImage
